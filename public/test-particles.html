<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>粒子测试</title>
<script type="importmap">{"imports":{"three":"/vendor/three.module.min.js"}}</script>
<style>
*{margin:0;padding:0}html,body{width:100vw;height:100vh;overflow:hidden;background:#020205}
#fx{position:fixed;bottom:16px;right:16px;z-index:10;background:rgba(0,0,0,.7);color:#fff;padding:10px;border-radius:8px;font-size:11px;display:flex;flex-direction:column;gap:6px;font-family:monospace}
.fx-row{display:flex;align-items:center;gap:6px}
select{background:#222;color:#fff;border:1px solid #444;padding:2px 6px}
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div id="fx">
  <div class="fx-row"><span>调色板</span><select id="fx-palette"><option value="0">极光</option><option value="1">暖金</option><option value="2">深空</option><option value="3">霓虹</option></select></div>
  <div class="fx-row"><span>噪声</span><input type="range" id="fx-noise" min="0.05" max="0.5" step="0.01" value="0.2"></div>
  <div class="fx-row"><span>位移</span><input type="range" id="fx-disp" min="0.3" max="2.5" step="0.05" value="1.2"></div>
  <div class="fx-row"><span>大小</span><input type="range" id="fx-size" min="30" max="200" step="5" value="100"></div>
  <div id="fps" style="color:#7f8">FPS: --</div>
</div>

<script type="module">
import * as THREE from 'three';

// === Noise GLSL ===
const NOISE = `
vec4 permute(vec4 x){return mod(((x*34.0)+10.0)*x,289.0);}
float pnoise(vec2 P,vec2 rep){
  vec4 Pi=floor(P.xyxy)+vec4(0,0,1,1);
  vec4 Pf=fract(P.xyxy)-vec4(0,0,1,1);
  Pi=mod(Pi,rep.xyxy);Pi=mod(Pi,289.0);
  vec4 ix=Pi.xzxz,iy=Pi.yyww;
  vec4 fx=Pf.xzxz,fy=Pf.yyww;
  vec4 i=permute(permute(ix)+iy);
  vec4 gx=2.0*fract(i*0.0243902439)-1.0;
  vec4 gy=abs(gx)-0.5;
  vec4 tx=floor(gx+0.5);gx=gx-tx;
  vec2 g00=vec2(gx.x,gy.x),g10=vec2(gx.y,gy.y),g01=vec2(gx.z,gy.z),g11=vec2(gx.w,gy.w);
  vec4 norm=1.79284291400159-0.85373472095314*vec4(dot(g00,g00),dot(g01,g01),dot(g10,g10),dot(g11,g11));
  g00*=norm.x;g01*=norm.y;g10*=norm.z;g11*=norm.w;
  float n00=dot(g00,vec2(fx.x,fy.x)),n10=dot(g10,vec2(fx.y,fy.y));
  float n01=dot(g01,vec2(fx.z,fy.z)),n11=dot(g11,vec2(fx.w,fy.w));
  vec2 fade_xy=Pf.xy*Pf.xy*Pf.xy*(Pf.xy*(Pf.xy*6.0-15.0)+10.0);
  vec2 n_x=mix(vec2(n00,n01),vec2(n10,n11),fade_xy.x);
  return 2.3*mix(n_x.x,n_x.y,fade_xy.y);
}
`;

const PALETTE = `
vec3 palette(float t,vec3 a,vec3 b,vec3 c,vec3 d){return a+b*cos(6.28318530718*(c*t+d));}
vec3 getColor(float p,float idx){
  if(idx>0.5&&idx<1.5)return palette(p,vec3(0.8,0.7,0.6),vec3(0.2,0.2,0.2),vec3(1,1,1),vec3(0.0,0.1,0.2));
  if(idx>1.5&&idx<2.5)return palette(p,vec3(0.15,0.25,0.45),vec3(0.15,0.15,0.2),vec3(1,1,1),vec3(0.0,0.1,0.2));
  if(idx>2.5)return palette(p,vec3(0.5,0.5,0.5),vec3(0.5,0.5,0.5),vec3(1,1,1),vec3(0.0,0.25,0.5));
  return palette(p,vec3(0.5,0.5,0.5),vec3(0.5,0.5,0.5),vec3(1,1,1),vec3(0.0,0.33,0.67));
}
`;

const VS = `
precision highp float;
uniform float uTime;
uniform float uPaletteIndex,uNoiseScale,uDisplacement,uPointScale;
attribute float aRand;
varying vec3 vColor;
varying float vAlpha;

#define PI 3.14159265359
${NOISE}
${PALETTE}

void main(){
  float theta=atan(position.z,position.x);
  float phi=asin(normalize(position).y);
  vec2 uv=vec2((theta/PI)*6.0,(phi/(PI/2.0))*6.0);
  float n=pnoise(uv*uNoiseScale+vec2(uTime*0.15,uTime*0.1),vec2(12.0));
  float amp=n*uDisplacement;
  vec3 np=position+normal*amp;
  vec4 mv=modelViewMatrix*vec4(np,1.0);
  gl_Position=projectionMatrix*mv;
  gl_PointSize=uPointScale/(-mv.z);
  float cp=(position.y/4.0)*0.5+0.5+n*0.25;
  vColor=getColor(fract(cp),uPaletteIndex);
  vAlpha=0.4+abs(n)*0.6;
}
`;

const FS = `
precision highp float;
varying vec3 vColor;
varying float vAlpha;
void main(){
  float d=length(gl_PointCoord-vec2(0.5));
  if(d>0.5)discard;
  float edge=smoothstep(0.5,0.35,d);
  float rim=smoothstep(0.5,0.0,d);
  vec3 col=vColor*(0.5+rim*0.5);
  gl_FragColor=vec4(col,vAlpha*edge);
}
`;

const VS_GLOW = `
precision highp float;
uniform float uTime;
uniform float uPaletteIndex,uNoiseScale,uDisplacement,uPointScale;
attribute float aRand;
varying vec3 vColor;
varying float vAlpha;

#define PI 3.14159265359
${NOISE}
${PALETTE}

void main(){
  float theta=atan(position.z,position.x);
  float phi=asin(normalize(position).y);
  vec2 uv=vec2((theta/PI)*6.0,(phi/(PI/2.0))*6.0);
  float n=pnoise(uv*uNoiseScale+vec2(uTime*0.15,uTime*0.1),vec2(12.0));
  float amp=n*uDisplacement*1.2;
  vec3 np=position+normal*(amp+0.1);
  vec4 mv=modelViewMatrix*vec4(np,1.0);
  gl_Position=projectionMatrix*mv;
  gl_PointSize=uPointScale*1.5/(-mv.z);
  float cp=(position.y/4.0)*0.5+0.5+n*0.25;
  vColor=getColor(fract(cp),uPaletteIndex);
  vAlpha=0.15+abs(n)*0.25;
}
`;

const FS_GLOW = `
precision highp float;
varying vec3 vColor;
varying float vAlpha;
void main(){
  float d=length(gl_PointCoord-vec2(0.5));
  if(d>0.5)discard;
  vec3 col=vColor*1.5;
  float sg=exp(-d*4.0);
  gl_FragColor=vec4(col,vAlpha*sg);
}
`;

// === Build geometry ===
const N = 10000;
const R = 4.0;
const pos = new Float32Array(N*3);
const nor = new Float32Array(N*3);
const rnd = new Float32Array(N);

for(let i=0;i<N;i++){
  const theta=Math.acos(1-2*(i+0.5)/N);
  const phi=Math.sqrt(N*Math.PI)*theta;
  const st=Math.sin(theta);
  const x=st*Math.cos(phi),y=st*Math.sin(phi),z=Math.cos(theta);
  pos[i*3]=x*R;pos[i*3+1]=y*R;pos[i*3+2]=z*R;
  nor[i*3]=x;nor[i*3+1]=y;nor[i*3+2]=z;
  rnd[i]=Math.random();
}

const geo=new THREE.BufferGeometry();
geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
geo.setAttribute('normal',new THREE.BufferAttribute(nor,3));
geo.setAttribute('aRand',new THREE.BufferAttribute(rnd,1));

// === Scene ===
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x020205);
const camera=new THREE.PerspectiveCamera(45,window.innerWidth/window.innerHeight,0.1,100);
camera.position.z=14;

const renderer=new THREE.WebGLRenderer({canvas:document.getElementById('bg-canvas'),antialias:false,powerPreference:'high-performance',alpha:false});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setSize(window.innerWidth,window.innerHeight);

// === Materials ===
const uniforms={
  uTime:{value:0},
  uPaletteIndex:{value:0},
  uNoiseScale:{value:0.2},
  uDisplacement:{value:1.2},
  uPointScale:{value:100},
};

const mat=new THREE.ShaderMaterial({uniforms,vertexShader:VS,fragmentShader:FS,transparent:true,depthWrite:false,blending:THREE.NormalBlending});
const pts=new THREE.Points(geo,mat);
pts.frustumCulled=false;
scene.add(pts);

const gmat=new THREE.ShaderMaterial({uniforms,vertexShader:VS_GLOW,fragmentShader:FS_GLOW,transparent:true,depthWrite:false,blending:THREE.AdditiveBlending});
const gpts=new THREE.Points(geo,gmat);
gpts.frustumCulled=false;
scene.add(gpts);

// === Controls ===
document.getElementById('fx-palette').onchange=e=>uniforms.uPaletteIndex.value=parseInt(e.target.value);
document.getElementById('fx-noise').oninput=e=>uniforms.uNoiseScale.value=parseFloat(e.target.value);
document.getElementById('fx-disp').oninput=e=>uniforms.uDisplacement.value=parseFloat(e.target.value);
document.getElementById('fx-size').oninput=e=>uniforms.uPointScale.value=parseFloat(e.target.value);

// === FPS ===
const fpse=document.getElementById('fps');
let ft=0,fc=0;

// === Mouse orbit ===
let mx=0,my=0,cmx=0,cmy=0;
document.addEventListener('mousemove',e=>{mx=(e.clientY/window.innerHeight*2-1)*0.3;my=-(e.clientX/window.innerWidth*2-1)*0.3});

// === Loop ===
let lt=performance.now();
function loop(){
  requestAnimationFrame(loop);
  const now=performance.now();
  const dt=Math.min(0.1,(now-lt)/1000);lt=now;

  uniforms.uTime.value+=dt*0.4;

  const f=1-Math.exp(-6*dt);
  cmx+=(mx-cmx)*f;cmy+=(my-cmy)*f;
  pts.rotation.x=cmx;pts.rotation.y=cmy+uniforms.uTime.value*0.03;
  gpts.rotation.x=cmx;gpts.rotation.y=cmy+uniforms.uTime.value*0.03;

  renderer.render(scene,camera);

  fc++;ft+=dt;
  if(ft>0.5){fpse.textContent='FPS: '+Math.round(fc/ft);ft=0;fc=0;}
}
loop();

window.addEventListener('resize',()=>{
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});
</script>
</body>
</html>
