<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Mineradio 粒子效果预览</title>
<script type="importmap">{"imports":{"three":"/vendor/three.module.min.js"}}</script>
<style>
html,body{height:100vh;width:100vw;overflow:hidden;background:#000;margin:0}
canvas{display:block}
#info{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.5);font:13px sans-serif;pointer-events:none}
</style>
</head>
<body>
<div id="info">Mineradio 粒子系统预览 — 拖拽旋转 · 滚轮缩放</div>
<script type="module">
import * as THREE from 'three';

const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(60,window.innerWidth/window.innerHeight,0.1,100);
camera.position.z=14;
const renderer=new THREE.WebGLRenderer({alpha:true,antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
document.body.appendChild(renderer.domElement);

// 自定义软光点纹理 (Mineradio 同款)
function mkTex(){const c=document.createElement('canvas');c.width=64;c.height=64;const x=c.getContext('2d');const g=x.createRadialGradient(32,32,0,32,32,32);g.addColorStop(0,'rgba(255,255,255,1)');g.addColorStop(0.06,'rgba(255,255,255,0.98)');g.addColorStop(0.2,'rgba(255,255,255,0.7)');g.addColorStop(0.45,'rgba(200,220,255,0.2)');g.addColorStop(1,'rgba(0,0,0,0)');x.fillStyle=g;x.fillRect(0,0,64,64);return new THREE.CanvasTexture(c)}
const ptex=mkTex();

// Mineradio 风格着色器 — 逐粒子大小 + 颜色 + 辉光
const pVS=`attribute float size;attribute vec3 color;varying vec3 vCol;varying float vAlpha,vBright;uniform float uPointScale;
void main(){vec4 mv=modelViewMatrix*vec4(position,1.0);float s=size*uPointScale*(280.0/-mv.z);gl_PointSize=clamp(s,0.5,60.0);gl_Position=projectionMatrix*mv;vCol=color;vAlpha=0.55;vBright=0.3;}`;

const pFS=`uniform sampler2D uTex;varying vec3 vCol;varying float vAlpha,vBright;
void main(){vec4 t=texture2D(uTex,gl_PointCoord);if(t.a<0.015)discard;float a=t.a*t.a;vec3 col=vCol*(0.65+vBright*0.5);gl_FragColor=vec4(col,a*vAlpha*0.72);}`;

const bFS=`uniform sampler2D uTex;varying vec3 vCol;varying float vAlpha,vBright;
void main(){vec4 t=texture2D(uTex,gl_PointCoord);if(t.a<0.008)discard;float a=t.a*t.a*t.a;vec3 col=vCol*(0.9+vBright*0.8);gl_FragColor=vec4(col,a*vAlpha*0.22);}`;

// ===== 主粒子层 — 球状星云 (Mineradio emily 风格) =====
const N1=800;
const g1=new THREE.BufferGeometry();
const p1=new Float32Array(N1*3),c1=new Float32Array(N1*3),sz1=new Float32Array(N1);
for(let i=0;i<N1;i++){
  const r=4+Math.random()*16,th=Math.random()*Math.PI*2,ph=Math.acos(2*Math.random()-1);
  p1[i*3]=r*Math.sin(ph)*Math.cos(th);p1[i*3+1]=r*Math.sin(ph)*Math.sin(th);p1[i*3+2]=r*Math.cos(ph)-2;
  const co=new THREE.Color().setHSL(0.5+Math.random()*0.25,0.55,0.25+Math.random()*0.6);
  c1[i*3]=co.r;c1[i*3+1]=co.g;c1[i*3+2]=co.b;
  sz1[i]=0.03+Math.random()*0.12;
}
g1.setAttribute('position',new THREE.BufferAttribute(p1,3));
g1.setAttribute('color',new THREE.BufferAttribute(c1,3));
g1.setAttribute('size',new THREE.BufferAttribute(sz1,1));
const m1=new THREE.ShaderMaterial({uniforms:{uTex:{value:ptex},uPointScale:{value:550}},vertexShader:pVS,fragmentShader:pFS,transparent:true,depthWrite:false,blending:THREE.AdditiveBlending});
const l1=new THREE.Points(g1,m1);l1.renderOrder=1;scene.add(l1);

// ===== 辉光层 =====
const N2=400;
const g2=new THREE.BufferGeometry();
const p2=new Float32Array(N2*3),c2=new Float32Array(N2*3),sz2=new Float32Array(N2);
for(let i=0;i<N2;i++){
  const r=5+Math.random()*14,th=Math.random()*Math.PI*2,ph=Math.acos(2*Math.random()-1);
  p2[i*3]=r*Math.sin(ph)*Math.cos(th);p2[i*3+1]=r*Math.sin(ph)*Math.sin(th);p2[i*3+2]=r*Math.cos(ph)-2;
  const co=new THREE.Color().setHSL(0.48+Math.random()*0.3,0.4,0.25+Math.random()*0.55);
  c2[i*3]=co.r;c2[i*3+1]=co.g;c2[i*3+2]=co.b;
  sz2[i]=0.06+Math.random()*0.16;
}
g2.setAttribute('position',new THREE.BufferAttribute(p2,3));
g2.setAttribute('color',new THREE.BufferAttribute(c2,3));
g2.setAttribute('size',new THREE.BufferAttribute(sz2,1));
const m2=new THREE.ShaderMaterial({uniforms:{uTex:{value:ptex},uPointScale:{value:520}},vertexShader:pVS,fragmentShader:bFS,transparent:true,depthWrite:false,blending:THREE.AdditiveBlending});
const l2=new THREE.Points(g2,m2);l2.renderOrder=0;scene.add(l2);

// ===== 漂浮微粒层 =====
const N3=120;
const g3=new THREE.BufferGeometry();
const p3=new Float32Array(N3*3),c3=new Float32Array(N3*3),sz3=new Float32Array(N3);
const fb=new Float32Array(N3*3),fph=new Float32Array(N3*3),fa=new Float32Array(N3);
for(let i=0;i<N3;i++){
  fb[i*3]=(Math.random()-0.5)*18;fb[i*3+1]=(Math.random()-0.5)*12;fb[i*3+2]=(Math.random()-0.5)*6;
  p3[i*3]=fb[i*3];p3[i*3+1]=fb[i*3+1];p3[i*3+2]=fb[i*3+2];
  fph[i*3]=Math.random()*Math.PI*2;fph[i*3+1]=Math.random()*Math.PI*2;fph[i*3+2]=Math.random()*Math.PI*2;
  fa[i]=0.08+Math.random()*0.25;
  const co=new THREE.Color().setHSL(0.42+Math.random()*0.18,0.35,0.35+Math.random()*0.45);
  c3[i*3]=co.r;c3[i*3+1]=co.g;c3[i*3+2]=co.b;
  sz3[i]=0.012+Math.random()*0.045;
}
g3.setAttribute('position',new THREE.BufferAttribute(p3,3));
g3.setAttribute('color',new THREE.BufferAttribute(c3,3));
g3.setAttribute('size',new THREE.BufferAttribute(sz3,1));
const m3=new THREE.ShaderMaterial({uniforms:{uTex:{value:ptex},uPointScale:{value:580}},vertexShader:pVS,fragmentShader:pFS,transparent:true,depthWrite:false,blending:THREE.AdditiveBlending});
const l3=new THREE.Points(g3,m3);l3.renderOrder=2;scene.add(l3);

// 鼠标交互 — 拖拽旋转 + 弹簧回正
let rotX=0,rotY=0,velX=0,velY=0,trX=0,trY=0,drag=false,pMX=0,pMY=0;
let zoom=14;
document.addEventListener('mousemove',(e)=>{
  if(drag){velX=(e.clientX-pMX)*0.003;velY=(e.clientY-pMY)*0.003;pMX=e.clientX;pMY=e.clientY}
  else{trX=(e.clientX/window.innerWidth*2-1)*0.4;trY=-(e.clientY/window.innerHeight*2-1)*0.4}
});
document.addEventListener('mousedown',(e)=>{drag=true;pMX=e.clientX;pMY=e.clientY});
document.addEventListener('mouseup',()=>{drag=false});
document.addEventListener('wheel',(e)=>{zoom=Math.max(6,Math.min(25,zoom+e.deltaY*0.01))},{passive:true});

function anim(){
  requestAnimationFrame(anim);
  if(drag){rotX+=velY;rotY+=velX}else{rotX+=(trX-rotX)*0.06;rotY+=(trY-rotY)*0.06;velX*=0.92;velY*=0.92;rotX+=velY;rotY+=velX}
  l1.rotation.x=rotX;l1.rotation.y=rotY;
  l2.rotation.x=rotX*0.85;l2.rotation.y=rotY*0.85;
  l3.rotation.x=rotX*0.6;l3.rotation.y=rotY*0.6;

  // 漂浮微粒漂移
  const ap=l3.geometry.attributes.position.array;
  const t=Date.now()*0.0004;
  for(let i=0;i<N3;i++){
    ap[i*3]=fb[i*3]+Math.sin(t+fph[i*3])*fa[i];
    ap[i*3+1]=fb[i*3+1]+Math.cos(t*0.7+fph[i*3+1])*fa[i];
    ap[i*3+2]=fb[i*3+2]+Math.sin(t*0.5+fph[i*3+2])*fa[i]*0.5;
  }
  l3.geometry.attributes.position.needsUpdate=true;

  camera.position.z+=(zoom-camera.position.z)*0.05;
  renderer.render(scene,camera);
}
anim();
window.addEventListener('resize',()=>{camera.aspect=window.innerWidth/window.innerHeight;camera.updateProjectionMatrix();renderer.setSize(window.innerWidth,window.innerHeight)});
</script>
</body>
</html>
